name = "deepspace-crm"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*", "/internal/*", "/v1/*", "/_deepspace/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AppRecordRoom", "AppYjsRoom", "AppCanvasRoom", "AppPresenceRoom", "AppCronRoom"]

[durable_objects]
bindings = [
  { name = "RECORD_ROOMS", class_name = "AppRecordRoom" },
  { name = "YJS_ROOMS", class_name = "AppYjsRoom" },
  { name = "CANVAS_ROOMS", class_name = "AppCanvasRoom" },
  { name = "PRESENCE_ROOMS", class_name = "AppPresenceRoom" },
  { name = "CRON_ROOMS", class_name = "AppCronRoom" },
]

[[r2_buckets]]
binding = "FILES"
bucket_name = "auto"

# Immutable app identity (docs: app-identity registry). Data scope, tokens,
# secrets, and collaborators all key to it. Renames are safe. This app predates
# the identity registry, so its backfilled id is its name (verified against
# the platform's /api/apps registry).
[vars]
DEEPSPACE_APP_ID = "deepspace-crm"
APP_NAME = "deepspace-crm"

[dev]
port = 8780
inspector_port = 9237

# Secrets (set via `wrangler secret put` or written by `deepspace dev`):
#   AUTH_JWT_PUBLIC_KEY
#   AUTH_JWT_ISSUER
#   AUTH_WORKER_URL
#   OWNER_USER_ID
#   INTERNAL_STORAGE_HMAC_SECRET
